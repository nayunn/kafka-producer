name: deploy to kafka broker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ 현재 브랜치 체크아웃
      - name: Checkout release
        uses: actions/checkout@v4

      # 2️⃣ 프로젝트 전체 압축
      - name: Archive project to tar.gz
        run: tar -czf ./kafka-producer.tar.gz ./*

      # 3️⃣ AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET_KEY }}
          aws-region: ap-northeast-2

      # 4️⃣ 압축 파일을 S3에 업로드
      - name: Upload to S3
        run: |
          aws s3 cp ./kafka-producer.tar.gz \
            s3://datalake-actions-deploy-nayun/kafka-producer/kafka-producer.tar.gz \
            --region ap-northeast-2

      # 5️⃣ CodeDeploy를 통해 배포 실행
      - name: Deploy with AWS CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name datalake-deploy \
            --deployment-group-name kafka-deploy \
            --s3-location bucket=datalake-a
