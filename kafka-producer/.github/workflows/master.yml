name: deploy to kafka broker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ 프로젝트 압축 (tar.gz)
    - name: Archive project to tar.gz
      run: tar cvfz kafka-producer.tar.gz ./*

    # 3️⃣ AWS 자격증명 설정 (최신 버전)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    # 4️⃣ S3로 아카이브 업로드
    - name: Upload artifact to S3
      run: |
        aws s3 cp kafka-producer.tar.gz \
          s3://datalake-actions-deploy-nayun/kafka-producer/kafka-producer.tar.gz \
          --region ap-northeast-2

    # 5️⃣ CodeDeploy를 이용해 배포 실행
    - name: Create CodeDeploy deployment
      run: |
        aws deploy create-deployment \
          --application-name datalake-deploy \
          --deployment-group-name kafka-deploy \
          --s3-location bucket=datalake-actions-deploy-nayun,bundleType=tgz,key=kafka-producer/kafka-producer.tar.gz \
          --region ap-northeast-2
