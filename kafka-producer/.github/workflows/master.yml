name: deploy to kafka broker

on:
  # master 브랜치에 push가 발생했을 때 Actions 실행
  push:
    branches: [ master ]
  # 수동 실행도 가능하도록 설정
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # kafka-producer 폴더 안으로 들어가 압축 생성
    - name: Archive project to tar.gz
      run: |
        cd kafka-producer
        tar -czf ../kafka-producer.tar.gz ./*

    # AWS 자격 증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET_KEY }}
        aws-region: ap-northeast-2

    # S3 버킷으로 압축 파일 업로드
    - name: Upload to S3
      run: |
        aws s3 cp ../kafka-producer.tar.gz \
          s3://datalake-actions-deploy-nayun/kafka-producer/kafka-producer.tar.gz \
          --region ap-northeast-2

    # CodeDeploy를 통해 배포 실행
    - name: Deploy with AWS CodeDeploy
      run: |
        aws deploy create-deployment \
          --application-name datalake-deploy \
          --deployment-group-name kafka-deploy \
          --s3-location bucket=datalake-actions-deploy-nayun,bundleType=tgz,key=kafka-producer/kafka-producer.tar.gz \
          --region ap-northeast-2
