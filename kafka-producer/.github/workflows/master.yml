# .github/workflows/master.yml
name: deploy to kafka broker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      # (중요) kafka-producer 폴더 안 "내용만" 압축
      - name: Archive project to tar.gz
        run: |
          tar -czf ../kafka-producer.tar.gz -C ./kafka-producer .
          # 구조 확인(Logs에서 확인)
          tar -tzf ../kafka-producer.tar.gz | head -20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET_KEY }}
          aws-region: ap-northeast-2

      # 업로드는 반드시 -nayun 버킷으로
      - name: Upload to S3
        run: |
          aws s3 cp ../kafka-producer.tar.gz \
            s3://datalake-actions-deploy-nayun/kafka-producer/kafka-producer.tar.gz \
            --region ap-northeast-2

      # CodeDeploy도 동일 버킷/키 사용
      - name: Deploy with AWS CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name datalake-deploy \
            --deployment-group-name kafka-deploy \
            --s3-location bucket=datalake-actions-deploy-nayun,bundleType=tgz,key=kafka-producer/kafka-producer.tar.gz \
            --region ap-northeast-2
