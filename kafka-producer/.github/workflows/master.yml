name: deploy to kafka broker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout release
      uses: actions/checkout@v4

    # ✅ kafka-producer 폴더 안으로 들어가서 압축
    - name: archive to tar.gz
      run: |
        cd kafka-producer
        tar cvfz ../kafka-producer.tar.gz ./*

    - name: AWS configure credentials
      uses: aws-actions/configure-aws-credentials@v4  # ✅ 최신 버전 (v1 → v4)
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET_KEY }}
        aws-region: ap-northeast-2

    # ✅ 압축 결과 파일은 kafka-producer 폴더 밖 (repo 루트)에 생기므로 그대로 S3 업로드 가능
    - name: upload to S3
      run: |
        aws s3 cp \
          ./kafka-producer.tar.gz \
          s3://datalake-actions-deploy-nayun/kafka-producer/kafka-producer.tar.gz \
          --region ap-northeast-2

    - name: deploy with AWS CodeDeploy
      run: |
        aws deploy create-deployment \
          --application-name datalake-deploy \
          --deployment-group-name kafka-deploy \
          --s3-location bucket=datalake-actions-deploy-nayun,bundleType=tgz,key=kafka-producer/kafka-producer.tar.gz \
          --region ap-northeast-2
